<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱吃三文鱼🍣</title>
    <style>
        :root {
            --primary: #FF7E5F;
            --secondary: #FEB47B;
            --bg: #f4f5f7;
            --text: #333;
        }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            background-image: radial-gradient(#d1d1d1 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Segoe UI', "Microsoft YaHei", sans-serif;
            color: var(--text);
        }
        .container { max-width: 900px; margin: 40px auto; padding: 20px; }
        
        .header {
            background: white; padding: 30px; border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-left: 8px solid var(--primary);
            margin-bottom: 20px;
        }
        .header h1 { margin: 0; font-size: 2rem; color: var(--primary); }
        .header p { margin: 10px 0 0; color: #666; font-size: 1.1rem; font-style: italic; }
        
        .userbox-container { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; }
        .userbox {
            display: flex; width: 250px; height: 50px; border: 1px solid #ccc;
            background: white; border-radius: 4px; overflow: hidden;
            box-shadow: 1px 1px 4px rgba(0,0,0,0.05); transition: 0.2s;
        }
        .userbox:hover { transform: translateY(-2px); box-shadow: 1px 4px 8px rgba(0,0,0,0.1); }
        .userbox-id {
            width: 50px; background: var(--primary); color: white;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 1.4rem;
        }
        .userbox-info { padding: 5px 10px; font-size: 0.85rem; display: flex; align-items: center; flex: 1; line-height: 1.3; }
        
        .ub-tech { background: #333; font-size: 1.2rem; }
        .ub-anime { background: #E91E63; font-size: 1rem; }
        
        .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .panel { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .panel h2 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-top: 0; font-size: 1.3rem; }
        
        .nav-back {
            display: inline-block; margin-top: 20px; padding: 10px 20px;
            background: var(--primary); color: white; text-decoration: none;
            border-radius: 20px; font-weight: bold; transition: transform 0.2s;
            text-align: center; width: 100%; box-sizing: border-box;
        }
        .nav-back:hover { transform: scale(1.05); }

        @media (max-width: 768px) { .content-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>三文鱼🐟的博客</h1>
            <p>「你见过天使👼吗？」- 来自日常的碎碎念。</p>
        </div>

        <div class="userbox-container">
            <div class="userbox">
                <div class="userbox-id">🍣</div>
                <div class="userbox-info">这个用户极度热爱<b>三文鱼</b>！</div>
            </div>
            <div class="userbox">
                <div class="userbox-id ub-anime">NPC</div>
                <div class="userbox-info">这个用户拒绝做<b>NPC</b>！</div>
            </div>
        </div>

        <div class="content-grid">
            <div class="panel">
                <h2>💬 留言板 (Guestbook)</h2>
                <p style="font-size: 0.9rem; color: #666; margin-bottom: 20px;">
                    有什么想对我说的话，或者想吐槽的，尽情留在这里吧✨！
                </p>
                
                <script src="https://giscus.app/client.js"
                        data-repo="rorenwang/Hello-Page"
                        data-repo-id="R_kgDOR2qGFQ"
                        data-category="General"
                        data-category-id="DIC_kwDOR2qGFc4C5xKO"
                        data-mapping="url"
                        data-strict="0"
                        data-reactions-enabled="1"
                        data-emit-metadata="0"
                        data-input-position="bottom"
                        data-theme="preferred_color_scheme"
                        data-lang="zh-CN"
                        crossorigin="anonymous"
                        async>
                </script>
                </div>

            <div class="panel">
                <h2>💡 状态板 (Status)</h2>
                <p><b>当前状态：</b><br>持续进化中...(๑•̀ㅂ•́)و✧</p>
                <p><b>本站架构：</b><br>GitHub Pages + Giscus</p>
                <p><b>格言：</b><br>我要吃一辈子的<b>三文鱼</b>！</p>
                
                <a href="/" class="nav-back">← 返回主页</a>
            </div>
        </div>
    </div>
</body>
</html>
