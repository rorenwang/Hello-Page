<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Roren</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body {
            background: linear-gradient(45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2); padding: 3rem; border-radius: 2rem;
            text-align: center; color: white; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); max-width: 400px; width: 90%;
        }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; letter-spacing: 2px; }
        p { font-size: 1rem; opacity: 0.9; margin-bottom: 2rem; line-height: 1.6; }
        .links { display: grid; gap: 1rem; }
        .link-item {
            background: rgba(255, 255, 255, 0.2); color: white; text-decoration: none;
            padding: 0.8rem; border-radius: 0.8rem; transition: all 0.3s;
        }
        .link-item:hover { background: white; color: #e73c7e; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size: 60px; margin-bottom: 15px;">🚀</div>
        <h1>爱吃三文鱼🍣</h1>
        <p>欢迎来到大本营<br>这里是技术与灵感的自留地</p>
        <div class="links">
            <a href="#" class="link-item">我的博客</a>
            <a href="https://zh.wikipedia.org/wiki/%E5%A4%A9%E4%BD%BF" class="link-item">应许之地</a>
        </div>
    </div>
</body>
</html>
